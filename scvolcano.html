<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://jeffreytsao.github.io/RonC/scvolcanodata.js"></script>
<title>Volcano - Angiosarcoma vs Normal Endothelium</title>
<style>
body { font-family: -apple-system, Arial, sans-serif; margin: 20px; }
.controls { margin-bottom: 15px; padding: 12px; background: #f5f5f5; border-radius: 6px; }
.controls input { width: 500px; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
.controls button { padding: 8px 14px; margin-left: 6px; cursor: pointer; border: 1px solid #888; background: white; border-radius: 4px; }
.controls button:hover { background: #eaeaea; }
.controls button.active { background: #4a90d9; color: white; border-color: #2a70b9; }
.hint { color: #666; font-size: 11px; margin-top: 6px; }
.notfound { color: #C00; font-size: 12px; margin-top: 6px; }
.control-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="controls">
  <div class="control-row">
    <input type="text" id="gene-search" placeholder="Type gene names separated by comma or space, then press Enter..." onkeydown="if(event.key==='Enter') highlightGenes()" />
    <button onclick="highlightGenes()">Highlight</button>
    <button onclick="clearHighlight()">Clear</button>
    <button id="spotlight-btn" onclick="toggleSpotlight()">🔦 Spotlight: Up + Surface</button>
  </div>
  <div class="hint">Example: PDPN, FLT4, KDR, ERG (case-insensitive). Searched genes appear in yellow. Marker size ∝ √(tumor NTPM).</div>
  <div class="notfound" id="notfound-msg"></div>
</div>
<div>
    <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
    <script charset="utf-8" src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <div id="volcano-plot" class="plotly-graph-div" style="height:800px; width:1200px;"></div>
</div>

<script type="text/javascript">
    const plotDivId = "volcano-plot";
    let spotlightActive = false;

    // --- Size scaling: sqrt of NTPM, clamped to [3, 20] px ---
    function ntpmToSize(ntpm) {
        if (ntpm == null || isNaN(ntpm) || ntpm <= 0) return 4; // default for missing
        const s = Math.sqrt(ntpm);
        // sqrt(1)=1, sqrt(2476)≈49.76 → scale into [3,20]
        const minS = 1, maxS = 50;
        const minPx = 3, maxPx = 20;
        return minPx + (s - minS) / (maxS - minS) * (maxPx - minPx);
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (typeof geneData !== 'undefined') {
            initializeDynamicPlot(geneData);
        } else {
            console.error("geneData is not loaded.");
        }
    });

    function initializeDynamicPlot(data) {
        const classesMap = {};
        for (let i = 0; i < data.genes.length; i++) {
            const cls = data.class[i] || 'NS';
            if (!classesMap[cls]) classesMap[cls] = [];
            classesMap[cls].push(i);
        }

        const colorPalette = {
            'NS':           '#DDDDDD',
            'Up in angio':  '#00AA44',
            'Down in angio':'#DD2222'
        };

        const traces = [];
        Object.keys(classesMap).forEach(className => {
            const indices = classesMap[className];
            const color = colorPalette[className] || '#' + Math.floor(Math.random()*16777215).toString(16);

            const surfaceIdx    = indices.filter(idx => !!data.surface[idx]);
            const nonSurfaceIdx = indices.filter(idx => !data.surface[idx]);

            const makeTrace = (idxList, isSurface) => ({
                x: idxList.map(idx => data.logfc[idx]),
                y: idxList.map(idx => data.neg_log10_padj[idx]),
                text: idxList.map(idx => data.genes[idx]),
                customdata: idxList.map(idx => [
                    data.surface[idx] ? 'Yes' : 'No',
                    data.tumorNTPM[idx] != null ? data.tumorNTPM[idx].toFixed(1) : 'N/A'
                ]),
                mode: 'markers',
                name: isSurface ? `${className} – surface (${idxList.length})` : `${className} (${idxList.length})`,
                legendgroup: className,
                hovertemplate: '<b>%{text}</b><br>log2FC: %{x:.2f}<br>-log10(padj): %{y:.1f}<br>Surface protein: %{customdata[0]}<br>Tumor NTPM: %{customdata[1]}<extra></extra>',
                marker: {
                    color: color,
                    size: idxList.map(idx => ntpmToSize(data.tumorNTPM[idx])),
                    symbol: isSurface ? 'diamond' : 'circle',
                    opacity: 0.85
                }
            });

            if (nonSurfaceIdx.length > 0) traces.push(makeTrace(nonSurfaceIdx, false));
            if (surfaceIdx.length > 0)    traces.push(makeTrace(surfaceIdx, true));
        });

        const layout = {
            title: { text: document.title || 'Volcano Plot' },
            xaxis: { title: { text: 'log2 Fold Change (log2FC)' }, showgrid: true, zeroline: true },
            yaxis: { title: { text: '-log10 adjusted P-value (-log10 padj)' }, showgrid: true, zeroline: true },
            hovermode: 'closest',
            margin: { t: 50, b: 50, l: 60, r: 30 },
            showlegend: true
        };

        Plotly.newPlot(plotDivId, traces, layout, { responsive: true });
    }

    // ---- Spotlight toggle ----
    function toggleSpotlight() {
        spotlightActive = !spotlightActive;
        const btn = document.getElementById('spotlight-btn');
        btn.classList.toggle('active', spotlightActive);

        const plotDiv = document.getElementById(plotDivId);
        const updates = plotDiv.data.map(trace => {
            const isSpotlightTrace = trace.name && trace.name.startsWith('Up in angio – surface');
            if (spotlightActive) {
                return isSpotlightTrace
                    ? { 'marker.opacity': 0.95 }
                    : { 'marker.opacity': 0.07 };
            } else {
                return { 'marker.opacity': 0.85 };
            }
        });

        const traceIndices = plotDiv.data.map((_, i) => i);
        updates.forEach((upd, i) => Plotly.restyle(plotDiv, upd, [i]));
    }

    // ---- Gene search ----
    function highlightGenes() {
        const input = document.getElementById('gene-search').value;
        const msg = document.getElementById('notfound-msg');
        msg.textContent = '';

        if (!input.trim() || typeof geneData === 'undefined') return;

        const searchNames = input.split(/[,\s]+/).map(g => g.trim().toUpperCase()).filter(Boolean);
        const matchedIndices = [];
        const notFound = [...searchNames];

        for (let i = 0; i < geneData.genes.length; i++) {
            const currentGeneUpper = geneData.genes[i].toUpperCase();
            const searchIdx = notFound.indexOf(currentGeneUpper);
            if (searchIdx >= 0) {
                matchedIndices.push(i);
                notFound.splice(searchIdx, 1);
            }
        }

        if (matchedIndices.length === 0) {
            msg.textContent = 'None of the searched genes were found in the dataset.';
            return;
        }

        const userTrace = {
            x: matchedIndices.map(idx => geneData.logfc[idx]),
            y: matchedIndices.map(idx => geneData.neg_log10_padj[idx]),
            text: matchedIndices.map(idx => geneData.genes[idx]),
            customdata: matchedIndices.map(idx => [
                geneData.surface[idx] ? 'Yes' : 'No',
                geneData.tumorNTPM[idx] != null ? geneData.tumorNTPM[idx].toFixed(1) : 'N/A'
            ]),
            mode: 'markers+text',
            textposition: 'top center',
            marker: {
                color: '#FFD700',
                size: matchedIndices.map(idx => ntpmToSize(geneData.tumorNTPM[idx]) + 2),
                symbol: matchedIndices.map(idx => geneData.surface[idx] ? 'diamond' : 'circle'),
                line: { color: '#000000', width: 1.5 },
                opacity: 1.0
            },
            name: 'User search (' + matchedIndices.length + ')',
            hovertemplate: '<b>%{text}</b><br>log2FC: %{x:.2f}<br>-log10(padj): %{y:.1f}<br>Surface protein: %{customdata[0]}<br>Tumor NTPM: %{customdata[1]}<extra></extra>'
        };

        const plotDiv = document.getElementById(plotDivId);
        const existingIdx = plotDiv.data.findIndex(t => t.name && t.name.startsWith('User search'));
        if (existingIdx >= 0) Plotly.deleteTraces(plotDiv, existingIdx);
        Plotly.addTraces(plotDiv, userTrace);

        if (notFound.length > 0) msg.textContent = 'Not found in dataset: ' + notFound.join(', ');
    }

    function clearHighlight() {
        document.getElementById('gene-search').value = '';
        document.getElementById('notfound-msg').textContent = '';
        const plotDiv = document.getElementById(plotDivId);
        const existingIdx = plotDiv.data.findIndex(t => t.name && t.name.startsWith('User search'));
        if (existingIdx >= 0) Plotly.deleteTraces(plotDiv, existingIdx);
    }
</script>
</body>
</html>
